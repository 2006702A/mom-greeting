<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>天津站之九子夺嫡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}html{height:100%}
body{min-height:100%;overflow-y:auto;overflow-x:hidden;background:#0f0f1a;font-family:'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;-webkit-tap-highlight-color:transparent;user-select:none}
.bg-dots{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.bg-dot{position:absolute;border-radius:50%;animation:bgDrift linear infinite;opacity:.3}
@keyframes bgDrift{0%{transform:translateY(105vh) rotate(0)}100%{transform:translateY(-10vh) rotate(360deg)}}
.app{position:relative;z-index:1;max-width:460px;width:95%;margin:0 auto;padding:10px 0 30px}

/* ══════ 卡通小人Live场景 ══════ */
.live-scene{background:linear-gradient(180deg,rgba(255,107,107,.06),rgba(77,150,255,.06));border-radius:20px;padding:8px 4px 4px;margin-bottom:10px;border:1px solid rgba(255,255,255,.06);position:relative;overflow:hidden;min-height:140px}
.live-chars{display:flex;flex-wrap:wrap;justify-content:center;gap:1px;position:relative;z-index:2}
.live-char{position:relative;cursor:pointer;transition:transform .2s;text-align:center;padding:6px 8px 2px;-webkit-tap-highlight-color:transparent}
.live-char:active{transform:scale(.9)}
.live-char .lc-emoji{font-size:42px;display:block;transition:all .3s;animation:lcIdle 3s ease-in-out infinite}
.live-char:nth-child(2) .lc-emoji{animation-delay:.3s}.live-char:nth-child(3) .lc-emoji{animation-delay:.6s}.live-char:nth-child(4) .lc-emoji{animation-delay:.9s}.live-char:nth-child(5) .lc-emoji{animation-delay:1.2s}.live-char:nth-child(6) .lc-emoji{animation-delay:1.5s}.live-char:nth-child(7) .lc-emoji{animation-delay:1.8s}
@keyframes lcIdle{0%,100%{transform:translateY(0)}30%{transform:translateY(-3px)}60%{transform:translateY(0)}}
.live-char .lc-name{font-size:10px;color:rgba(255,255,255,.55);margin-top:1px;font-weight:600}
.live-char.speaking .lc-emoji{animation:speakBounce .4s ease-in-out 2}
@keyframes speakBounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-12px) scale(1.15)}}
.speech-bubble{position:absolute;background:rgba(255,255,255,.95);color:#222;border-radius:14px;padding:7px 11px;font-size:12px;font-weight:600;max-width:200px;z-index:10;pointer-events:none;animation:bubFloat 3s ease-out forwards;box-shadow:0 4px 16px rgba(0,0,0,.3);word-break:break-word;line-height:1.4}
@keyframes bubFloat{0%{opacity:0;transform:translateY(8px)}15%{opacity:1;transform:translateY(0)}80%{opacity:1;transform:translateY(-6px)}100%{opacity:0;transform:translateY(-18px)}}
.speech-bubble::after{content:'';position:absolute;bottom:-6px;left:20px;width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid rgba(255,255,255,.95)}
.speech-bubble.reply{background:rgba(255,255,200,.95)}
.speech-bubble.reply::after{border-top-color:rgba(255,255,200,.95)}

/* ══════ 模式切换 ══════ */
.mode-tabs{display:flex;gap:5px;margin-bottom:10px}
.mode-tab{flex:1;padding:9px 0;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:rgba(255,255,255,.5);font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;font-family:inherit}
.mode-tab.sel{background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.2)}

.panel{display:none;margin-bottom:10px}
.panel.show{display:block}

/* 群聊 */
.group-chat{max-height:360px;overflow-y:auto;background:rgba(255,255,255,.03);border-radius:18px;padding:12px;border:1px solid rgba(255,255,255,.06)}
.gc-msg{padding:7px 11px;margin-bottom:5px;border-radius:14px;font-size:13px;max-width:82%;animation:msgIn .25s ease-out;border-bottom-left-radius:2px}
@keyframes msgIn{0%{transform:translateY(6px);opacity:0}100%{transform:translateY(0);opacity:1}}
.gc-msg .who{font-size:10px;opacity:.55;margin-bottom:1px}
.gc-all-btn{display:block;width:100%;padding:12px;margin-top:8px;border-radius:16px;border:none;background:linear-gradient(135deg,rgba(255,82,82,.3),rgba(255,152,0,.3));color:#ff8a80;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:2px;font-family:inherit;transition:all .2s}
.gc-all-btn:active{transform:scale(.94)}

/* 朋友圈 */
.moment-card{background:rgba(255,255,255,.04);border-radius:18px;padding:14px;border:1px solid rgba(255,255,255,.06);margin-bottom:8px;animation:slideIn .35s ease-out backwards}
@keyframes slideIn{0%{transform:translateX(-20px);opacity:0}100%{transform:translateX(0);opacity:1}}
.moment-card .mh{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.moment-card .mav{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}
.moment-card .mname{font-size:13px;font-weight:700;color:#fff}
.moment-card .mtime{font-size:10px;color:rgba(255,255,255,.25)}
.moment-card .mt{font-size:14px;color:rgba(255,255,255,.7);line-height:1.5;margin-bottom:6px}
.moment-card .ma{display:flex;gap:16px;font-size:12px;color:rgba(255,255,255,.3)}

/* ══════ 游戏 ══════ */
.game-tabs{display:flex;gap:4px;margin-bottom:10px}
.gtab{flex:1;padding:7px 0;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:rgba(255,255,255,.45);font-size:11px;font-weight:600;cursor:pointer;text-align:center;font-family:inherit;transition:all .15s}
.gtab.sel{background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.2)}

.whack-board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:320px;margin:0 auto}
.whack-hole{aspect-ratio:1;border-radius:50%;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;font-size:44px;cursor:pointer;border:3px solid rgba(255,255,255,.06);transition:all .1s}
.whack-hole.active{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);transform:scale(1.05)}
.whack-hole:active{transform:scale(.85)}
.whack-score{text-align:center;font-size:22px;font-weight:900;color:#ffd93d;margin:10px 0}
.whack-start{display:block;width:100%;padding:10px;border-radius:16px;border:none;background:linear-gradient(135deg,rgba(255,107,107,.4),rgba(255,152,0,.4));color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:8px}
.whack-start:active{transform:scale(.94)}

.wheel-wrap{text-align:center}
.wheel-canvas{max-width:280px;width:100%;cursor:pointer}
.wheel-canvas:active{transform:scale(.95)}
.wheel-result{font-size:16px;color:#fff;font-weight:700;margin-top:10px;padding:10px;background:rgba(255,255,255,.06);border-radius:12px;min-height:48px;display:flex;align-items:center;justify-content:center;text-align:center}

.danmaku-stage{height:280px;background:rgba(0,0,0,.3);border-radius:18px;position:relative;overflow:hidden;margin-bottom:8px;border:1px solid rgba(255,255,255,.06)}
.danmaku-msg{position:absolute;white-space:nowrap;font-size:16px;font-weight:700;animation:dmFly 8s linear forwards;pointer-events:none;z-index:10}
@keyframes dmFly{0%{transform:translateX(105%);opacity:1}85%{opacity:1}100%{transform:translateX(-120%);opacity:0}}
.danmaku-row{display:flex;gap:6px}
.danmaku-in{flex:1;padding:10px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#fff;font-size:13px;font-family:inherit;outline:none}
.danmaku-send{padding:10px 18px;border-radius:20px;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.danmaku-presets{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.danmaku-presets button{padding:5px 10px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);font-size:10px;cursor:pointer;font-family:inherit}

/* 私聊弹窗 */
.chat-popup{position:fixed;bottom:0;left:0;right:0;z-index:500;background:rgba(15,15,26,.98);backdrop-filter:blur(20px);border-radius:22px 22px 0 0;padding:16px;max-width:460px;margin:0 auto;display:none;animation:cpUp .3s ease-out;max-height:70vh;overflow-y:auto}
.chat-popup.show{display:block}
@keyframes cpUp{0%{transform:translateY(100%)}100%{transform:translateY(0)}}
.cp-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cp-name{font-size:18px;font-weight:800;color:#fff}
.cp-x{width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:14px;cursor:pointer}
.cp-msgs{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;max-height:220px;overflow-y:auto}
.cp-msg{padding:9px 13px;border-radius:15px;font-size:13px;max-width:80%;line-height:1.4;animation:msgIn .25s ease-out;word-break:break-word}
.cp-msg.them{align-self:flex-start;background:rgba(255,255,255,.08);color:#ddd;border-bottom-left-radius:3px}
.cp-msg.me{align-self:flex-end;background:rgba(255,255,255,.16);color:#fff;border-bottom-right-radius:3px}
.cp-row{display:flex;gap:6px}
.cp-in{flex:1;padding:9px 12px;border-radius:18px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#fff;font-size:13px;font-family:inherit;outline:none}
.cp-send{width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,.12);color:#fff;font-size:16px;cursor:pointer;flex-shrink:0}
.cp-quick{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.cp-quick button{padding:6px 11px;border-radius:13px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);color:rgba(255,255,255,.6);font-size:11px;cursor:pointer;font-family:inherit}

.overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:499;background:rgba(0,0,0,.5);display:none}
.overlay.show{display:block}

.music-btn{position:fixed;bottom:20px;right:20px;z-index:400;width:46px;height:46px;border-radius:50%;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:22px;cursor:pointer;backdrop-filter:blur(10px);box-shadow:0 4px 16px rgba(0,0,0,.3);transition:all .2s}
.music-btn:active{transform:scale(.88)}
.music-btn.on{animation:musRot 2s linear infinite;background:rgba(255,107,107,.3)}
@keyframes musRot{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

.toast{position:fixed;top:44%;left:50%;transform:translate(-50%,-50%) scale(0);background:rgba(0,0,0,.92);border-radius:16px;padding:16px 24px;font-size:16px;font-weight:700;color:#fff;z-index:600;pointer-events:none;text-align:center;max-width:82%}
.toast.show{animation:tp 1.6s ease-out forwards}
@keyframes tp{0%{transform:translate(-50%,-50%) scale(0)}10%{transform:translate(-50%,-50%) scale(1.1)}20%{transform:translate(-50%,-50%) scale(1)}65%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(.8);opacity:0}}

@media(max-width:360px){.live-char .lc-emoji{font-size:34px}.live-char{padding:4px 5px 0px}}
</style>
</head>
<body>

<div class="bg-dots" id="bgDots"></div>
<div class="toast" id="toast"></div>
<div class="overlay" id="overlay"></div>
<div class="chat-popup" id="chatPopup"></div>
<button class="music-btn" id="musicBtn">🎵</button>

<div class="app">
  <!-- ══════ 卡通小人Live场景 ══════ -->
  <div class="live-scene" id="liveScene">
    <div class="live-chars" id="liveChars"></div>
  </div>

  <!-- ══════ 模式切换 ══════ -->
  <div class="mode-tabs">
    <button class="mode-tab" data-panel="group">💬 群聊</button>
    <button class="mode-tab" data-panel="moments">📱 朋友圈</button>
    <button class="mode-tab sel" data-panel="games">🎮 游戏</button>
  </div>

  <!-- 群聊 -->
  <div class="panel" id="panelGroup">
    <div class="group-chart">
      <div id="gcMsgs"></div>
      <button class="gc-all-btn" id="gcAllBtn">📢 @全体成员</button>
    </div>
  </div>

  <!-- 朋友圈 -->
  <div class="panel" id="panelMoments"><div id="momentsContent"></div></div>

  <!-- 游戏 -->
  <div class="panel show" id="panelGames">
    <div class="game-tabs">
      <button class="gtab sel" data-game="whack">🔨 打地鼠</button>
      <button class="gtab" data-game="wheel">🎡 真心话大冒险</button>
      <button class="gtab" data-game="danmaku">💬 弹幕墙</button>
    </div>
    <div id="gameWhack">
      <div class="whack-score">得分：<b id="whackScore">0</b> / 时间：<b id="whackTime">30</b>s</div>
      <div class="whack-board" id="whackBoard"></div>
      <button class="whack-start" id="whackStart">🔨 开始打地鼠！</button>
    </div>
    <div id="gameWheel" style="display:none">
      <div class="wheel-wrap">
        <canvas class="wheel-canvas" id="wheelCanvas" width="280" height="280"></canvas>
        <div class="wheel-result" id="wheelResult">👆 点转盘开始旋转</div>
      </div>
    </div>
    <div id="gameDanmaku" style="display:none">
      <div class="danmaku-stage" id="danmakuStage"></div>
      <div class="danmaku-row">
        <input class="danmaku-in" id="dmInput" placeholder="发条弹幕..." maxlength="40" autocomplete="off">
        <button class="danmaku-send" id="dmSend">🚀</button>
      </div>
      <div class="danmaku-presets" id="dmPresets"></div>
    </div>
  </div>
</div>

<script>
// ══════ 数据 ══════
const chars=[{id:'yanzi',name:'燕子',emoji:'🐋',tag:'出轨狂魔',c:'#448aff',catchphrases:['老廖怎么天天跟我聊天','我都没时间出轨了','烦死了这老廖','什么时候能出轨啊','今天老廖又黏上我了','出轨计划无限延期'],personality:['恋爱脑','话多','容易烦'],mentions:['老廖','出轨']},{id:'qinyi',name:'秦熠',emoji:'🪼',tag:'填志愿',c:'#aa00ff',catchphrases:['新疆人吃饭了','这志愿填得我想死','新疆菜好吃啊','来新疆吃饭啊','填志愿比高考还离谱','我妈天天问我志愿'],personality:['吃货','纠结','想躺平'],mentions:['新疆','志愿','饭']},{id:'laodai',name:'老戴',emoji:'🐕',tag:'虚假学习',c:'#ff9100',catchphrases:['我真开始学习了','手机怎么这么好玩','再玩五分钟就学','今天一定学','不是我不想学是手机先动的手','明天一定开始'],personality:['拖延症','手机控','自我欺骗'],mentions:['学习','手机','五分钟']},{id:'qiangzi',name:'强子',emoji:'🪳',tag:'宝妈',c:'#8d6e63',catchphrases:['何云伟太萌了你们看看','我儿子今天又可爱了','何云伟会叫妈妈了','看我儿子照片','何云伟今天拉粑粑了开心','当妈太幸福了'],personality:['晒娃','幸福','话多'],mentions:['何云伟','儿子','可爱']},{id:'piaoyunli',name:'飘云里',emoji:'🐰',tag:'金鱼杀手',c:'#00bfa5',catchphrases:['沈明珠屋内不许荡秋千','我的金鱼怎么不动了','它应该是睡着了吧','我的金鱼一定还活着','沈明珠！！','今天金鱼也没动但它肯定活着'],personality:['执着','幻觉','管闲事'],mentions:['沈明珠','金鱼','秋千']},{id:'naima',name:'奶妈',emoji:'🐱',tag:'追老师',c:'#ff5252',catchphrases:['英语老师今天穿得好好看','我要追到英语老师','英语老师冲我笑了','为了英语老师我要好好学英语','今天又去办公室找英语老师了','英语老师看我了！！'],personality:['花痴','执着','自我感动'],mentions:['英语老师','好看','追']},{id:'luzhilian',name:'陆智联',emoji:'🧑',tag:'求资源',c:'#ffab00',catchphrases:['谁有网站','我要视频','有没有网站发一下','兄弟们来点资源','最近有没有新网站','分享一下啊兄弟们'],personality:['直接','执念','不管不顾'],mentions:['网站','视频','资源']}];
const gcColors=['#82b1ff','#ea80fc','#ffab40','#bcaaa4','#64ffda','#ff8a80','#ffff00'];
const gcNames=['燕子🦋','秦熠🪼','老戴🐕','强子🪳','飘云里🐰','奶妈🐱','陆智联🧑'];

// ══════ 丰富回复系统 ══════
// 每个角色有多种回复模板，结合上下文
const replyBank={
  yanzi:['笑死我了@name','哈哈哈哈@name你懂我','@name说得对！','老廖听了都摇头','@name我出轨带你一个','真的会谢哈哈哈哈','@name别说了笑死','老廖：你们在聊啥','我愿称@name为天津最懂','确实确实确实'],
  qinyi:['新疆欢迎你@name','来吃大盘鸡@name','志愿填完了吗就在这聊','@name你志愿填哪了','哈哈哈新疆人表示赞同','@name来新疆我请你吃饭','填志愿太痛苦了别提了','拉条子了解一下@name'],
  laodai:['@name别说了我先学五分钟','哈哈哈哈手机真好玩','@name一起玩手机啊学什么习','笑死根本学不进去','我发誓明天一定开始学','你看我像是学习的人吗','手机先放不下啊@name'],
  qiangzi:['何云伟听了都鼓掌','@name你看看我儿子照片','何云伟说@name说得对','哈哈哈哈我儿子也觉得好笑','@name你以后肯定是个好爸爸','何云伟又拉粑粑了你看看'],
  piaoyunli:['沈明珠！！不许荡秋千！！','我的金鱼动了！！它真的动了！！','@name你看见我金鱼了吗','沈明珠你听到没@name','金鱼只是睡着了你们别瞎说','@name你帮我去看看沈明珠在不在'],
  naima:['英语老师今天也看我了','@name你觉得英语老师喜欢我吗','英语老师冲我笑了！！','@name帮我想想办法追英语老师','我今天又去办公室了！！','英语老师穿衬衫太好看了'],
  luzhilian:['@name有网站吗分享一下','哈哈哈哈别光聊天来点资源','正经人谁没有网站啊','@name发个网站','百度搜不到才问你们的','你们聊我只要网站']
};
const laughReplies=['哈哈哈哈笑死了','救命好好笑','我不行了','笑死我对你有什么好处','哈哈哈哈哈哈嗝','🤣🤣🤣','6','你是懂幽默的','有道理但不多','哈哈哈哈确实'];

function smartReply(fromId,toId){
  const bank=replyBank[fromId]||replyBank['laodai'];
  let r=bank[Math.floor(Math.random()*bank.length)];
  if(toId!==null&&r.includes('@name')){const to=chars.find(c=>c.id===toId);r=r.replace(/@name/g,to?to.name:'大家')}
  if(!r.includes('@name')&&Math.random()<.3){r=laughReplies[Math.floor(Math.random()*laughReplies.length)]+r}
  return r;
}

// ══════ 背景 ══════
(function(){const bg=document.getElementById('bgDots'),cl=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#20c997'];for(let i=0;i<20;i++){const d=document.createElement('div');d.className='bg-dot';d.style.width=(3+Math.random()*6)+'px';d.style.height=d.style.width;d.style.background=cl[Math.floor(Math.random()*cl.length)];d.style.left=Math.random()*95+'%';d.style.animationDuration=(10+Math.random()*20)+'s';d.style.animationDelay=Math.random()*10+'s';bg.appendChild(d)}})();
const toast=document.getElementById('toast');let tt;
function T(t){clearTimeout(tt);toast.textContent=t;toast.classList.remove('show');void toast.offsetWidth;toast.classList.add('show');tt=setTimeout(()=>toast.classList.remove('show'),1700)}

// ══════ Live场景：卡通小人互相聊天 ══════
const liveChars=document.getElementById('liveChars'),liveScene=document.getElementById('liveScene');
let lastSpeaker=-1,lastListener=-1;

chars.forEach((c,i)=>{
  const el=document.createElement('div');el.className='live-char';el.id='lc'+c.id;
  el.innerHTML='<span class="lc-emoji">'+c.emoji+'</span><span class="lc-name">'+c.name+'</span>';
  el.addEventListener('click',()=>openChat(c));
  liveChars.appendChild(el);
});

function showSpeechBubble(charId,text,isReply){
  const el=document.getElementById('lc'+charId);if(!el)return;
  el.classList.add('speaking');setTimeout(()=>el.classList.remove('speaking'),800);
  const bub=document.createElement('div');bub.className='speech-bubble'+(isReply?' reply':'');
  bub.textContent=text;
  const rect=el.getBoundingClientRect(),sceneRect=liveScene.getBoundingClientRect();
  const left=rect.left-sceneRect.left+rect.width/2-(text.length*3);
  bub.style.left=Math.max(2,Math.min(sceneRect.width-130,left))+'px';
  bub.style.top=(rect.top-sceneRect.top-35)+'px';
  liveScene.appendChild(bub);
  setTimeout(()=>bub.remove(),3200);
}

// 互相聊天的对话链
function startConversation(){
  const a=Math.floor(Math.random()*7);
  let b=Math.floor(Math.random()*7);
  while(b===a)b=Math.floor(Math.random()*7);
  // A先说话
  const speechA=chars[a].catchphrases[Math.floor(Math.random()*chars[a].catchphrases.length)];
  showSpeechBubble(chars[a].id,speechA,false);
  lastSpeaker=a;lastListener=b;
  // B回复
  setTimeout(()=>{
    const replyB=smartReply(chars[b].id,chars[a].id);
    showSpeechBubble(chars[b].id,replyB,true);
    // 偶尔C也插嘴
    if(Math.random()<.5){
      setTimeout(()=>{
        let c=Math.floor(Math.random()*7);
        while(c===a||c===b)c=Math.floor(Math.random()*7);
        const replyC=smartReply(chars[c].id,chars[b].id);
        showSpeechBubble(chars[c].id,replyC,true);
      },1200+Math.random()*1500);
    }
  },600+Math.random()*1400);
}

// 初始启动两轮对话
setTimeout(()=>startConversation(),800);
setTimeout(()=>startConversation(),2200);
// 定期对话
setInterval(()=>{if(Math.random()<.6){const solo=Math.floor(Math.random()*7);showSpeechBubble(chars[solo].id,chars[solo].catchphrases[Math.floor(Math.random()*chars[solo].catchphrases.length)],false)}else startConversation()},4000+Math.random()*3000);

function allMembers(){addGcMsg(0,'@全体成员 📢📢📢',null);[1,2,3,4,5,6].sort(()=>Math.random()-.5).forEach((i,idx)=>{setTimeout(()=>addGcMsg(i,smartReply(i,0),0),300+idx*(350+Math.random()*500))})}

// ══════ 私聊（智能回复） ══════
const chatPopup=document.getElementById('chatPopup'),overlay=document.getElementById('overlay');
function openChat(c){chatPopup.innerHTML='<div class="cp-h"><span class="cp-name">'+c.emoji+' '+c.name+'</span><button class="cp-x" onclick="closeChat()">✕</button></div><div class="cp-msgs" id="cpMsgs"><div class="cp-msg them">'+c.catchphrases[Math.floor(Math.random()*c.catchphrases.length)]+'</div></div><div class="cp-row"><input class="cp-in" id="cpInput" placeholder="跟'+c.name+'说点什么..." maxlength="200" autocomplete="off"><button class="cp-send" id="cpSend">➤</button></div><div class="cp-quick" id="cpQuick"></div>';const cq=document.getElementById('cpQuick');const idx=chars.indexOf(c);let others=[];while(others.length<3){const oi=Math.floor(Math.random()*7);if(oi!==idx&&!others.includes(oi))others.push(oi)}others.forEach(oi=>{const b=document.createElement('button');b.textContent='@'+chars[oi].name;b.addEventListener('click',()=>{addMsg('@'+chars[oi].name+' ','me');setTimeout(()=>autoReply(c,oi),400+Math.random()*600)});cq.appendChild(b)});chatPopup.classList.add('show');overlay.classList.add('show');document.getElementById('cpInput').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();sendMsg(c)}});document.getElementById('cpSend').addEventListener('click',()=>sendMsg(c));document.getElementById('cpInput').focus()}
function sendMsg(c){const inp=document.getElementById('cpInput');if(!inp||!inp.value.trim())return;addMsg(inp.value,'me');inp.value='';const ci=chars.indexOf(c);let ref=Math.floor(Math.random()*7);if(ref===ci)ref=null;setTimeout(()=>autoReply(c,ref),400+Math.random()*700)}
function addMsg(text,who){const msgs=document.getElementById('cpMsgs');if(!msgs)return;const d=document.createElement('div');d.className='cp-msg '+who;d.textContent=text;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight}
function autoReply(c,refId){const ci=chars.indexOf(c);const r=smartReply(c.id,refId);addMsg(r,'them');setTimeout(()=>{if(Math.random()<.35)addMsg(c.catchphrases[Math.floor(Math.random()*c.catchphrases.length)],'them')},600+Math.random()*800)}
function closeChat(){chatPopup.classList.remove('show');overlay.classList.remove('show')}
overlay.addEventListener('click',closeChat);

const wBoard=document.getElementById('whackBoard'),wScore=document.getElementById('whackScore'),wTime=document.getElementById('whackTime'),wStart=document.getElementById('whackStart');
for(let i=0;i<9;i++){const h=document.createElement('div');h.className='whack-hole';h.textContent='🕳️';h.addEventListener('click',()=>{if(h.classList.contains('active')){h.classList.remove('active');h.textContent='💥';ws++;wScore.textContent=ws;setTimeout(()=>{h.textContent='🕳️'},200)}});wBoard.appendChild(h)}
function popMole(){const holes=wBoard.querySelectorAll('.whack-hole');holes.forEach(h=>{h.classList.remove('active');h.textContent='🕳️'});const r=Math.floor(Math.random()*9);holes[r].classList.add('active');holes[r].textContent=chars[Math.floor(Math.random()*7)].emoji}
function startWhack(){ws=0;wt=30;wScore.textContent='0';wTime.textContent='30';wStart.textContent='🔨 游戏中...';wStart.disabled=true;popMole();mTimer=setInterval(popMole,750);wTimer=setInterval(()=>{wt--;wTime.textContent=wt;if(wt<=0){clearInterval(wTimer);clearInterval(mTimer);wStart.textContent='🔨 再来一局！';wStart.disabled=false;wBoard.querySelectorAll('.whack-hole').forEach(h=>{h.classList.remove('active');h.textContent='🕳️'});T('⏰ 时间到！得分：'+ws)}},1000)}

// ══════ 转盘 ══════
const wheelCanvas=document.getElementById('wheelCanvas'),wheelResult=document.getElementById('wheelResult');
const wheelItems=['🙈 真心话：上次哭是什么时候','😈 大冒险：学狗叫三声','🙈 真心话：暗恋过几个人','😈 大冒险：发一条最丑自拍','🙈 真心话：最社死的一次经历','😈 大冒险：用夹子音说话一分钟','🙈 真心话：有没有偷看过别人手机','😈 大冒险：模仿群里的一个人','🙈 真心话：做过最离谱的梦','😈 大冒险：倒立十秒钟','🙈 真心话：最近一次撒谎是什么','😈 大冒险：给上一个人发表情包'];
let wsAngle=0,wsSpinning=false;
function drawWheel(angle){const ctx=wheelCanvas.getContext('2d'),n=wheelItems.length,arc=2*Math.PI/n;ctx.clearRect(0,0,280,280);for(let i=0;i<n;i++){ctx.beginPath();ctx.moveTo(140,140);ctx.arc(140,140,130,angle+i*arc,angle+(i+1)*arc);ctx.fillStyle=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#20c997','#ff5252','#ffab40','#448aff','#00bfa5','#ff8a80'][i];ctx.fill();ctx.save();ctx.translate(140,140);ctx.rotate(angle+i*arc+arc/2);ctx.fillStyle='#fff';ctx.font='bold 10px "PingFang SC","Microsoft YaHei"';ctx.textAlign='center';ctx.fillText(wheelItems[i].slice(0,8)+'...',90,3);ctx.restore()}ctx.beginPath();ctx.arc(140,140,12,0,2*Math.PI);ctx.fillStyle='#fff';ctx.fill();ctx.beginPath();ctx.moveTo(140,20);ctx.lineTo(130,4);ctx.lineTo(150,4);ctx.closePath();ctx.fillStyle='#fff';ctx.fill()}
drawWheel(0);
wheelCanvas.addEventListener('click',()=>{if(wsSpinning)return;wsSpinning=true;const spins=3+Math.floor(Math.random()*3);const target=Math.random()*2*Math.PI;const total=spins*2*Math.PI+target;const start=wsAngle;const dur=3000;const startT=Date.now();function anim(){const elapsed=Date.now()-startT;const progress=Math.min(1,elapsed/dur);const ease=1-Math.pow(1-progress,3);wsAngle=start+total*ease;drawWheel(wsAngle);if(progress<1)requestAnimationFrame(anim);else{wsSpinning=false;const n=wheelItems.length,arc=2*Math.PI/n;const idx=Math.floor(((2*Math.PI-wsAngle%(2*Math.PI))%(2*Math.PI))/arc)%n;wheelResult.textContent=wheelItems[idx]}}anim()});

// ══════ 音乐 ══════
let ac=null,mo2=false,mt2=null;
const mel=[262,330,392,523,392,330,262,294,349,440,349,294,262,330,392,523,440,349,294,262],rhy=[180,180,200,200,180,180,220,180,180,200,180,180,220,160,160,180,160,160,200,280];
function tM(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();mo2=!mo2;const b=document.getElementById('musicBtn');if(mo2){b.textContent='🎶';b.classList.add('on');pN(0)}else{b.textContent='🎵';b.classList.remove('on');clearTimeout(mt2);if(ac.state==='running')ac.suspend()}}
function pN(i){if(!mo2)return;if(ac.state==='suspended')ac.resume();const o=ac.createOscillator(),g=ac.createGain();o.type='square';o.frequency.value=mel[i%mel.length];g.gain.setValueAtTime(.025,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+rhy[i%rhy.length]/1000);o.connect(g);g.connect(ac.destination);o.start(ac.currentTime);o.stop(ac.currentTime+rhy[i%rhy.length]/1000);mt2=setTimeout(()=>pN((i+1)%mel.length),rhy[i%rhy.length])}
document.getElementById('musicBtn').addEventListener('click',tM);
</script>
